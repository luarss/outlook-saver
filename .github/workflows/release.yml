name: Release Chrome Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest_version="$(grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]+"' chrome-extension/manifest.json | head -1 | grep -oE '[0-9]+(\.[0-9]+)*')"
          echo "Tag version:      $tag"
          echo "Manifest version: $manifest_version"
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag ($tag) does not match manifest version ($manifest_version)"
            exit 1
          fi

      - name: Package extension
        run: |
          tag="${GITHUB_REF_NAME}"
          # Zip with manifest.json at the archive root (Chrome Web Store + "Load unpacked" compatible).
          # Exclude the per-directory README so the package contains only shippable files.
          (cd chrome-extension && zip -r "../outlook-saver-${tag}.zip" . -x "README.md")
          ls -lh "outlook-saver-${tag}.zip"

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: outlook-saver-${{ github.ref_name }}.zip
